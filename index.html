<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<link rel="stylesheet" href="style.css">
<link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

</head>

<body>


<div class="wrapper">

<h1> Currency Converter</h1>

<div class="converter">

<div class="box">

<div class="currency">

<img id="fromFlag" src="https://flagsapi.com/US/flat/64.png">

<select id="fromCurrency">

</select>

</div>

<input type="number" id="amount" placeholder="Enter Amount">

</div>


<div class="swap">

<button onclick="swapCurrency()">⇅</button>

</div>


<div class="box">

<div class="currency">

<img id="toFlag" src="https://flagsapi.com/IN/flat/64.png">

<select id="toCurrency">

</select>

</div>

<input type="text" id="result" placeholder="Result" readonly>

</div>


<button class="convert" onclick="convertCurrency()">Get exchange rate</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
